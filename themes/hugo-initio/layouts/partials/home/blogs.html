
{{ $counter := 0 }}
<div class="row">
  {{ range where .Data.Pages "Section" .Section }}
    {{ if eq $counter 4 }}
      {{ $counter = 0 }}
      </div><div class="row">
    {{ end }}
    <div class="col-sm-6 col-md-3">

        <h3 class="text-center">{{ .Title }}</h3>
        <p>{{ .Summary }}</p>
        <p class="text-center"><a href="{{ .Permalink }}" class="btn btn-action">Read more</a></p>
      </div>
    {{ $counter = add $counter 1 }}
  {{ end }}
</div>
